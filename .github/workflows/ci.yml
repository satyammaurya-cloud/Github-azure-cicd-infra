name: Azure Infra - Plan Show Only

on:
  push:
    branches:
      - "main"

permissions:
  id-token: write
  contents: read

jobs:
  my_first_job:
    name: Terraform Plan Show Only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Az login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}  

      - name: 'Verify Azure Login Creds'
        run: |                            #Script in diff line with pipe symbol
          az account show
          az group list   

      - name: Terraform Installation
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Terraform Init
        run: terraform init
        working-directory: ./Azure-infra

      - name: Terraform FMT
        run: terraform fmt
        working-directory: ./Azure-infra

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./Azure-infra
        
      - name: Terraform Plan
        run: terraform plan
        working-directory: ./Azure-infra
