name: Azure Infra Setup

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  my_first_job:
    name: My first job
    runs-on: ubuntu-latest
    steps:
      - name: Az CLI logining to Azure Cloud
        uses: azure/login@8c334a195cbb38e46038007b304988d888bf676a
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}  

      - name: 'Verify Azure Login Creds'
        run: |                            #Script in diff line with pipe symbol
          az account show
          az group list   

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform Installation
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Terraform Init
        run: terraform init
        working-directory: ./Azure-infra

      - name: Terraform FMT
        run: terraform fmt
        working-directory: ./Azure-infra  

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./Azure-infra   
        
      - name: Terraform Plan
        run: terraform plan
        working-directory: ./Azure-infra     